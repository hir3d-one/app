packages:
  - "apps/*"
  - "packages/tasks"
  - "packages/database/auth"
  - "packages/database/app"
  - "packages/ai"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - stripe@22.3.2
overrides:
  '@opentelemetry/core': 2.8.0
  '@better-auth/stripe': 1.6.23
  '@better-fetch/fetch': 1.3.1
  better-auth: 1.6.23
  better-call: 1.3.7
  cookie: 0.7.2
  postcss: 8.5.19
  ws: 8.21.0
